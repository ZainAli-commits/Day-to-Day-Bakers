rel="stylesheet">

<!-- ================= SCHEMA ================= -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Restaurant",

  "name": "Day to Day Bakers",

  "url": "https://zainali-commits.github.io/Day-to-Day-Bakers/",

  "telephone": "+923495407325",

  "address": {
    "@type": "PostalAddress",

    "addressCountry": "PK"
  },

  "servesCuisine": [

    "Fast Food"
  ]
}
</script>

<style>

html{
    scroll-behavior:smooth;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f8f8f8;
    color:#222;
    overflow-x:hidden;
}

/* ================= SECTION ================= */

.section{
    display:flex;
    gap:60px;
    padding:90px 10%;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    flex-wrap:wrap;
}

/* ================= IMAGE ================= */

.image-box{
    flex:1 1 380px;
    display:flex;
    justify-content:center;
}

.section img{
    width:100%;
    max-width:420px;
    border-radius:24px;
    object-fit:cover;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    transition:0.4s ease;
}

.section img:hover{
    transform:scale(1.03);
}

/* ================= TEXT ================= */

.text{
    flex:1 1 450px;
}

.text h1{
    font-size:52px;
    font-family:'Playfair Display',serif;
    color:#c58b2a;
    margin-bottom:20px;
    line-height:1.1;
}

.text p{
    font-size:17px;
    line-height:1.9;
    color:#444;
    margin-bottom:35px;
}

/* ================= BUTTON ================= */

.order-btn{
    display:inline-block;
    padding:14px 32px;
    background:#c58b2a;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
    transition:0.3s ease;
    box-shadow:0 6px 20px rgba(197,139,42,0.3);
}

.order-btn:hover{
    background:#a87017;
    transform:translateY(-2px);
}

/* ================= MOBILE ================= */

@media(max-width:992px){

    .section{
        padding:70px 7%;
        gap:40px;
    }

    .text h1{
        font-size:42px;
    }
}

@media(max-width:768px){

    .section{
        flex-direction:column;
        text-align:center;
        padding:50px 6%;
        gap:35px;
    }

    .image-box{
        width:100%;
    }

    .section img{
        max-width:320px;
    }

    .text{
        width:100%;
    }

    .text h1{
        font-size:34px;
        margin-bottom:16px;
    }

    .text p{
        font-size:15px;
        line-height:1.8;
        margin-bottom:28px;
    }

    .order-btn{
        width:100%;
        max-width:260px;
        padding:14px 20px;
        font-size:15px;
    }
}

@media(max-width:480px){

    .section{
        padding:40px 5%;
    }

    .section img{
        max-width:260px;
        border-radius:18px;
    }

    .text h1{
        font-size:28px;
    }

    .text p{
        font-size:14px;
    }
}

</style>
</head>

<body>

<!-- ================= SECTION ================= -->

<div class="section">

    <div class="image-box">

        <img id="image"
        src=""
        loading="lazy"
        decoding="async"
        alt="Day to Day Bakers">

    </div>

    <div class="text">

        <h1 id="title"></h1>

        <p id="desc"></p>

        <a href="index.html#choose"
        class="order-btn"
        aria-label="Back to home page">

        ← Back
        </a>

    </div>

</div>

<script>

const data = {

    fresh: {

        title: "Fresh Ingredients",

        img: "fresh.webp",

        desc:
        "At Day to Day Bakers, freshness is the foundation of every dish we serve. We carefully select farm-fresh vegetables, high-quality meats, and premium cheese to ensure rich flavor and top-tier quality. Every ingredient is handled with care and prepared daily, so each bite delivers a natural, authentic, and satisfying taste experience that our customers can trust."
    },

    chef: {

        title: "Expert Chefs",

        img: "chef.webp",

        desc:
        "Our team of expert chefs brings passion, skill, and creativity into every recipe. With years of culinary experience, they focus on perfecting every detail — from dough preparation to flavor balance. Their dedication ensures that every pizza is crafted with precision, consistency, and a touch of artistry that makes our food stand out."
    },

    delivery: {

        title: "Fast Delivery",

        img: "fast1.webp",

        desc:
        "We believe great food should be enjoyed fresh and right on time. Our fast and reliable delivery system ensures your order reaches you quickly without compromising quality. Each item is carefully packed to maintain its heat, texture, and flavor, so you can enjoy a delicious meal just as if it came straight out of the oven."
    },

    quality: {

        title: "Best Quality",

        img: "quality.webp",

        desc:
        "Quality is at the core of everything we do. From sourcing premium ingredients to maintaining strict hygiene standards, we never compromise on excellence. Our goal is to provide a consistently outstanding experience, ensuring every meal delivers the perfect combination of taste, freshness, and customer satisfaction."
    }
};

const params = new URLSearchParams(window.location.search);

const type = params.get("type");

if (data[type]) {

    document.getElementById("title").innerText =
    data[type].title;

    document.getElementById("image").src =
    data[type].img;

    document.getElementById("image").alt =
    data[type].title;

    document.getElementById("desc").innerText =
    data[type].desc;
}

</script>

</body>
</html>
